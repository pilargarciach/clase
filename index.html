<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Nube de Palabras Educativas</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.3/src/wordcloud2.js"></script>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f3f4f6;
}

.container{
    width:90%;
    max-width:1000px;
    margin:auto;
    padding:30px;
}

h1{
    text-align:center;
    color:#111827;
}

.card{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 4px 10px rgba(0,0,0,.1);
    margin-top:20px;
}

textarea{
    width:100%;
    padding:15px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:18px;
    resize:none;
}

button{
    margin-top:20px;
    padding:15px 25px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

canvas{
    margin-top:20px;
    width:100%;
    height:auto;
    border-radius:15px;
    background:white;
    border:2px solid #ddd;
}

select{
    padding:10px;
    font-size:16px;
    border-radius:10px;
}

.hidden{
    display:none;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
}

.role-buttons{
    text-align:center;
    margin-top:40px;
}

.role-buttons button{
    margin:10px;
}

.success{
    font-size:24px;
    color:green;
    text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h1>Reflexión sobre Entornos Educativos</h1>

<!-- Selección inicial -->

<div class="role-buttons" id="homeScreen">

    <h2>Seleccione una opción</h2>

    <button onclick="showStudent()">
        Soy estudiante
    </button>

    <button onclick="showTeacher()">
        Soy docente
    </button>

</div>

<!-- ESTUDIANTE -->

<div id="studentSection" class="hidden">

    <div class="card">

        <h2 id="questionTitle"></h2>

        <textarea
            id="answerInput"
            rows="6"
            placeholder="Escribe tu respuesta..."
        ></textarea>

        <button onclick="nextQuestion()">
            Siguiente
        </button>

    </div>

</div>

<!-- FINAL -->

<div id="finishSection" class="hidden">

    <div class="card">

        <div class="success">
            ¡Gracias por participar!
        </div>

    </div>

</div>

<!-- DOCENTE -->

<div id="teacherSection" class="hidden">

    <div class="card">

        <div class="topbar">

            <h2>Nube de Palabras en Tiempo Real</h2>

            <select id="questionSelector">

                <option value="0">
                    Pregunta 1
                </option>

                <option value="1">
                    Pregunta 2
                </option>

                <option value="2">
                    Pregunta 3
                </option>

                <option value="3">
                    Pregunta 4
                </option>

            </select>

        </div>

        <canvas id="cloudCanvas" width="1200" height="700"></canvas>

    </div>

</div>

</div>

<script>

/* =========================================================
   PEGAR AQUÍ TU CONFIGURACIÓN DE FIREBASE
========================================================= */

const firebaseConfig = {

 // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDcSJqb6t7MDhqSHK2aIw8LJ_cxKS5PP5k",
  authDomain: "clase-189be.firebaseapp.com",
  projectId: "clase-189be",
  storageBucket: "clase-189be.firebasestorage.app",
  messagingSenderId: "524351028220",
  appId: "1:524351028220:web:d12b8a2ab76c9ff4c39079",
  measurementId: "G-HZR9115DBF"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

/* =========================================================
   PREGUNTAS
========================================================= */

const questions = [

"¿Cómo comprendemos la lectura de los Entornos Educativos?",

"Describa un cambio que ha percibido en las realidades educativas.",

"¿Qué tan relevante es pensar en los perfiles de los estudiantes para los procesos de enseñanza y escenarios educativos?",

"¿Cuáles considera que son los principales desafíos educativos existentes en la educación contemporánea?"

];

let currentQuestion = 0;

/* =========================================================
   PANTALLAS
========================================================= */

function showStudent(){

    document.getElementById("homeScreen").classList.add("hidden");

    document.getElementById("studentSection").classList.remove("hidden");

    renderQuestion();

}

function showTeacher(){

    document.getElementById("homeScreen").classList.add("hidden");

    document.getElementById("teacherSection").classList.remove("hidden");

    loadCloud(0);

}

/* =========================================================
   ESTUDIANTE
========================================================= */

function renderQuestion(){

    document.getElementById("questionTitle").innerText =
        questions[currentQuestion];

    document.getElementById("answerInput").value = "";

}

async function nextQuestion(){

    const answer =
        document.getElementById("answerInput").value.trim();

    if(answer === ""){

        alert("Por favor escribe una respuesta");

        return;

    }

    await db.collection("responses").add({

        questionIndex: currentQuestion,

        answer: answer,

        createdAt: new Date()

    });

    currentQuestion++;

    if(currentQuestion < questions.length){

        renderQuestion();

    }else{

        document.getElementById("studentSection")
            .classList.add("hidden");

        document.getElementById("finishSection")
            .classList.remove("hidden");

    }

}

/* =========================================================
   DOCENTE - NUBE DE PALABRAS
========================================================= */

const selector =
    document.getElementById("questionSelector");

selector.addEventListener("change", () => {

    loadCloud(Number(selector.value));

});

function loadCloud(questionIndex){

    db.collection("responses")
    .where("questionIndex", "==", questionIndex)
    .onSnapshot(snapshot => {

        const texts = [];

        snapshot.forEach(doc => {

            texts.push(doc.data().answer);

        });

        generateCloud(texts);

    });

}

function generateCloud(texts){

    const words = {};

    texts.forEach(text => {

        text
        .toLowerCase()
        .replace(/[.,!?¿¡()"]/g, "")
        .split(/\s+/)
        .forEach(word => {

            if(word.length > 3){

                words[word] =
                    (words[word] || 0) + 1;

            }

        });

    });

    const list = Object.entries(words);

    WordCloud(document.getElementById('cloudCanvas'), {

        list: list,

        gridSize: 12,

        weightFactor: 20,

        rotateRatio: 0.3

    });

}

</script>

</body>
</html>
