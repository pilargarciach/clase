<meta charset="UTF-8" />

<title>Nube de Palabras Educativas</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.3/src/wordcloud2.js"></script>

<style>


   body{

    margin:0;

    font-family:'Poppins', sans-serif;

    background:
    linear-gradient(
        135deg,
        #071B34 0%,
        #0B2A4A 25%,
        #123C66 50%,
        #1D4ED8 100%
    );

    min-height:100vh;

    color:#0B1F3A;

}

.container{
    width:90%;
    max-width:1000px;
    margin:auto;
    padding:30px;
}

h1{

    text-align:center;

    color:white;

    font-weight:600;

    letter-spacing:.5px;

    font-size:42px;

}

h2{

    color:white;

    font-weight:500;

}

.card{

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(14px);

    -webkit-backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,0.18);

    padding:30px;

    border-radius:24px;

    box-shadow:
    0 8px 32px rgba(0,0,0,0.25);

    margin-top:20px;

}

textarea{

    width:100%;

    padding:18px;

    border-radius:18px;

    border:none;

    font-size:18px;

    resize:none;

    background:rgba(255,255,255,.92);

    color:#0B1F3A;

    box-shadow:
    inset 0 2px 4px rgba(0,0,0,.08);

}

button{

    margin-top:20px;

    padding:15px 28px;

    border:none;

    border-radius:16px;

    background:linear-gradient(
        135deg,
        #2563EB,
        #1D4ED8
    );

    color:white;

    font-size:17px;

    font-weight:600;

    cursor:pointer;

    transition:all .3s ease;

    box-shadow:
    0 6px 18px rgba(37,99,235,.35);

}

button:hover{

    transform:translateY(-2px);

    box-shadow:
    0 10px 24px rgba(37,99,235,.45);

}

canvas{

    margin-top:20px;

    width:100%;

    height:auto;

    border-radius:24px;

    background:rgba(255,255,255,.95);

    box-shadow:
    0 10px 30px rgba(0,0,0,.25);

}

select{

    padding:12px 18px;

    border-radius:14px;

    border:none;

    font-size:16px;

    background:white;

    color:#0B1F3A;

    font-weight:500;

}

.hidden{
    display:none;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
}

.role-buttons{
    text-align:center;
    margin-top:40px;
}

.role-buttons button{

    margin-top:20px;

    padding:15px 25px;

    border:none;

    border-radius:14px;

    background:#1D4ED8;

    color:white;

    font-size:18px;

    cursor:pointer;

    transition:all .3s ease;

    box-shadow:0 4px 10px rgba(0,0,0,.15);

}

.success{
    font-size:24px;
    color:green;
    text-align:center;
}

/* FOOTER */

.footer{

    margin-top:50px;

    padding:20px;

    text-align:center;

    color:rgba(255,255,255,.7);

    font-size:13px;

    backdrop-filter:blur(6px);

}

.footer a{

    color:#93C5FD;

    text-decoration:none;

}

.footer a:hover{

    text-decoration:underline;

}


/* LOGO */

.logo-container{

    text-align:center;

    margin-top:20px;

}

.logo{

    width:220px;

    max-width:90%;

    margin-bottom:10px;

    object-fit:contain;

    mix-blend-mode:screen;

    filter:
    drop-shadow(0 0 12px rgba(59,130,246,.35))
    drop-shadow(0 10px 25px rgba(0,0,0,.35));

}

.logo:hover{

    transform:scale(1.03);

}

<body>

<div class="container">

<div class="logo-container">

    <img src="logo.png" class="logo">

</div>

<h1>Reflexión sobre Entornos Educativos</h1>

<!-- Selección inicial -->

<div class="role-buttons" id="homeScreen">

    <h2>Seleccione una opción</h2>

    <button onclick="showStudent()">
        Soy estudiante
    </button>

    <button onclick="showTeacher()">
        Soy docente
    </button>

</div>

<!-- ESTUDIANTE -->

<div id="studentSection" class="hidden">

    <div class="card">

        <h2 id="questionTitle"></h2>

        <textarea
            id="answerInput"
            rows="6"
            placeholder="Escribe tu respuesta..."
        ></textarea>

        <button onclick="nextQuestion()">
            Siguiente
        </button>

    </div>

</div>

<!-- FINAL -->

<div id="finishSection" class="hidden">

    <div class="card">

        <div class="success">
            ¡Gracias por participar!
        </div>

    </div>

</div>

<!-- DOCENTE -->

<div id="teacherSection" class="hidden">

    <div class="card">

        <div class="topbar">

            <h2>Respuestas</h2>
            <button onclick="clearResponses()">
            🗑️ Limpiar respuestas
            </button>

            <select id="questionSelector">

                <option value="0">
                    Pregunta 1
                </option>

                <option value="1">
                    Pregunta 2
                </option>

                <option value="2">
                    Pregunta 3
                </option>

                <option value="3">
                    Pregunta 4
                </option>

            </select>

        </div>

        <canvas id="cloudCanvas" width="1200" height="700"></canvas>

    </div>

</div>

</div>

<script>

/* =========================================================
   PEGAR AQUÍ TU CONFIGURACIÓN DE FIREBASE
========================================================= */
const firebaseConfig = {

  apiKey: "AIzaSyDcSJqb6t7MDhqSHK2aIw8LJ_cxKS5PP5k",

  authDomain: "clase-189be.firebaseapp.com",

  projectId: "clase-189be",

  storageBucket: "clase-189be.appspot.com",

  messagingSenderId: "524351028220",

  appId: "1:524351028220:web:d12b8a2ab76c9ff4c39079"

};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();



/* =========================================================
   PREGUNTAS
========================================================= */

const questions = [

"¿Cómo comprendemos la lectura de los Entornos Educativos?",

"Describa un cambio que ha percibido en las realidades educativas.",

"¿Qué tan relevante es pensar en los perfiles de los estudiantes para los procesos de enseñanza y escenarios educativos?",

"¿Cuáles considera que son los principales desafíos educativos existentes en la educación contemporánea?"

];

let currentQuestion = 0;

/* =========================================================
   PANTALLAS
========================================================= */

function showStudent(){

    document.getElementById("homeScreen").classList.add("hidden");

    document.getElementById("studentSection").classList.remove("hidden");

    renderQuestion();

}

function showTeacher(){

    document.getElementById("homeScreen").classList.add("hidden");

    document.getElementById("teacherSection").classList.remove("hidden");

    loadCloud(0);

}

/* =========================================================
   ESTUDIANTE
========================================================= */

function renderQuestion(){

    document.getElementById("questionTitle").innerText =
        questions[currentQuestion];

    document.getElementById("answerInput").value = "";

}

async function nextQuestion(){

    const answer =
        document.getElementById("answerInput").value.trim();

    if(answer === ""){

        alert("Por favor escribe una respuesta");

        return;

    }

    await db.collection("responses").add({

        questionIndex: Number(currentQuestion),

        answer: answer,

        createdAt: Date.now()

    });

    currentQuestion++;

    if(currentQuestion < questions.length){

        renderQuestion();

    }else{

        document.getElementById("studentSection")
            .classList.add("hidden");

        document.getElementById("finishSection")
            .classList.remove("hidden");

    }

}


/* =========================================================
   DOCENTE - NUBE DE PALABRAS
========================================================= */

const selector =
    document.getElementById("questionSelector");

selector.addEventListener("change", () => {

    loadCloud(parseInt(selector.value));

});

function loadCloud(questionIndex){

    db.collection("responses")
    .where("questionIndex", "==", Number(questionIndex))
    .onSnapshot(snapshot => {

        const texts = [];

        snapshot.forEach(doc => {

            texts.push(doc.data().answer);

        });

        generateCloud(texts);

    });

}

function generateCloud(texts){

    const words = {};

    texts.forEach(text => {

        text
        .toLowerCase()
        .replace(/[.,!?¿¡()"]/g, "")
        .split(/\s+/)
        .forEach(word => {

            if(word.length > 3){

                words[word] =
                    (words[word] || 0) + 1;

            }

        });

    });

    const list = Object.entries(words);

    WordCloud(document.getElementById('cloudCanvas'), {

        list: list,

        gridSize: 12,

        weightFactor: 20,

        rotateRatio: 0.3

    });

}

/* =====================================================
   BORRAR RESPUESTAS
===================================================== */

async function clearResponses(){

    const snapshot =
        await db.collection("responses").get();

    const promises = [];

    snapshot.forEach((doc)=>{

        promises.push(
            db.collection("responses")
            .doc(doc.id)
            .delete()
        );

    });

    await Promise.all(promises);

    alert("Todas las respuestas fueron eliminadas");

}

</script>
